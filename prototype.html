<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Striker Net Prototype</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;700&family=JetBrains+Mono&family=Tektur:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --background: #0d1516;
            --surface: #0d1930;
            --primary: #c3f5ff;
            --primary-container: #00e5ff;
            --on-surface-variant: #bac9cc;
            --surface-tint: #00daf3;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            background: var(--background);
            color: #dce4e5;
            font-family: 'Instrument Sans', sans-serif;
            overflow: hidden;
        }

        /* Layout */
        .viewportContainer {
            display: grid;
            grid-template-rows: 48px 1fr;
            width: 100vw;
            height: 100vh;
        }

        .mainContent {
            grid-row: 2;
            overflow-y: auto;
            padding: 24px;
        }

        /* Navbar */
        .navbar {
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            background: rgba(2, 6, 23, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            height: 48px;
            position: relative;
        }

        .logoContainer {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 64px;
            clip-path: polygon(0 0, 100% 0, 90% 100%, 10% 100%);
            background: #0A1525;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 -20px 30px -10px rgba(0, 218, 243, 0.3);
        }

        .logo {
            color: var(--primary);
            font-family: 'Tektur', sans-serif;
            font-weight: 900;
            font-size: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .navSection {
            flex: 1;
            display: flex;
            gap: 2rem;
            z-index: 10;
        }

        .navSection.right { justify-content: flex-end; }

        .navLink {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--on-surface-variant);
            text-decoration: none;
        }

        .navLink:hover { color: var(--primary-container); }

        /* Mock Content */
        .pageContent {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 24px;
            height: 100%;
        }

        .card {
            background: rgba(10, 21, 37, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            position: relative;
        }

        .card::before, .card::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 8px;
            border: 1px solid var(--surface-tint);
        }

        .card::before { top: -1px; left: -1px; border-bottom: none; border-right: none; }
        .card::after { bottom: -1px; right: -1px; border-top: none; border-left: none; }

    </style>
</head>
<body>
    <div class="viewportContainer">
        <header class="navbar">
            <nav class="navSection">
                <a href="#" class="navLink">Draws</a>
                <a href="#" class="navLink">Partners</a>
                <a href="#" class="navLink">Sales</a>
            </nav>
            <div class="logoContainer">
                <h1 class="logo">3D-STRIKER-NET</h1>
            </div>
            <nav class="navSection right">
                <a href="#" class="navLink">Risk</a>
                <a href="#" class="navLink">Report</a>
                <a href="#" class="navLink">Settings</a>
            </nav>
        </header>
        <main class="mainContent">
            <div class="pageContent">
                <div class="card" style="grid-column: span 6; grid-row: span 4;"><h2>Stats</h2></div>
                <div class="card" style="grid-column: span 6; grid-row: span 4;"><h2>System Status</h2></div>
                <div class="card" style="grid-column: span 12; grid-row: span 4;"><h2>Recent Activity</h2></div>
            </div>
        </main>
    </div>
</body>
</html>
