<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TICKET_FORMATTER_PRO_V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050507;
            --accent-neon: #00f2ff;
            --accent-dim: rgba(0, 242, 255, 0.3);
            --glass-card: rgba(15, 15, 25, 0.7);
            --border-line: rgba(255, 255, 255, 0.08);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --font-main: 'Space Grotesk', sans-serif;
            --font-mono: 'Fira Code', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: default;
        }

        body {
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(18, 18, 20, 0.8) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 18, 20, 0.8) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            color: var(--text-primary);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Ambient Grain Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3BaseFilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/feFilter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 10;
        }

        .main-frame {
            width: 95vw;
            max-width: 1100px;
            z-index: 2;
            position: relative;
        }

        /* Decorative Header */
        .system-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-line);
            padding-bottom: 12px;
        }

        .title-block h1 {
            font-size: 1.2rem;
            letter-spacing: 0.4rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--accent-neon);
            text-shadow: 0 0 10px var(--accent-dim);
        }

        .status-badge {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-neon);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-neon);
            animation: pulse 2s infinite;
        }

        /* The Dashboard */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .console-panel {
            background: var(--glass-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-line);
            border-radius: 4px; /* Sharper corners for a technical look */
            position: relative;
            overflow: hidden;
        }

        .console-panel::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
        }

        .panel-header {
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--border-line);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-title {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            height: 450px;
            background: transparent;
            border: none;
            padding: 20px;
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            line-height: 1.7;
            resize: none;
            outline: none;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-dim) transparent;
        }

        /* Futuristic Controls */
        .control-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        .cyber-btn {
            background: transparent;
            border: 1px solid var(--accent-dim);
            color: var(--accent-neon);
            padding: 12px 30px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            transition: all 0.3s;
            overflow: hidden;
            cursor: pointer;
        }

        .cyber-btn:hover {
            background: var(--accent-dim);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            transform: translateY(-2px);
        }

        .cyber-btn.primary {
            background: var(--accent-neon);
            color: var(--bg-deep);
            font-weight: 700;
        }

        .cyber-btn.primary:hover {
            background: #fff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        /* Technical details */
        .footer-info {
            margin-top: 24px;
            display: flex;
            justify-content: space-between;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-secondary);
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* Success Flash */
        .flash {
            animation: flash-bg 0.5s ease;
        }
        @keyframes flash-bg {
            0% { background: rgba(0, 242, 255, 0.2); }
            100% { background: transparent; }
        }

        @media (max-width: 850px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            textarea { height: 250px; }
            body { overflow-y: auto; padding: 40px 0; }
        }
    </style>
</head>
<body>

    <div class="main-frame">
        <header class="system-header">
            <div class="title-block">
                <h1>Ticket_Format.exe</h1>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                SYSTEM_STABLE // VERSION_2.1.0
            </div>
        </header>

        <main class="dashboard-grid">
            <section class="console-panel">
                <div class="panel-header">
                    <span class="panel-title">Inbound_Raw_Data</span>
                    <span class="panel-title" id="char-count">0 Chars</span>
                </div>
                <textarea id="input" placeholder=">_ Awaiting manual input..." oninput="updateCount()"></textarea>
            </section>

            <section class="console-panel">
                <div class="panel-header">
                    <span class="panel-title">Processed_Output</span>
                    <span class="panel-title">UTF-8 / Read_Only</span>
                </div>
                <textarea id="output" readonly placeholder=">_ System idle. Press format to begin..."></textarea>
            </section>
        </main>

        <div class="control-bar">
            <button class="cyber-btn" onclick="clearData()">[ Clear ]</button>
            <button class="cyber-btn primary" onclick="runFormatter()">Execute Format</button>
            <button class="cyber-btn" onclick="copyData()">[ Copy_Buffer ]</button>
        </div>

        <footer class="footer-info">
            <span>COORD: 35.6895° N, 139.6917° E</span>
            <span>ENGINE: REGEX_V8_SMART_CORE</span>
            <span>ENCRYPTION: AES-256-READY</span>
        </footer>
    </div>

    <script>
        function updateCount() {
            const val = document.getElementById('input').value.length;
            document.getElementById('char-count').innerText = `${val} Chars`;
        }

        function runFormatter() {
            const input = document.getElementById('input').value;
            const outputEl = document.getElementById('output');
            
            if (!input.trim()) return;

            const lines = input.split('\n');
            const result = lines.map(line => {
                let text = line.trim();
                if (!text) return null;

                const prefix = text.substring(0, 3);
                let body = text.substring(3).replace(/[/\~\+\.\=\s]+$/, '');

                // Rule 4 Check: Dual Amount
                const dualMatch = body.match(/(\d+)[Rr\/\s\=\-\.\+\~]+(\d+)/);
                if (dualMatch) {
                    return `${prefix} = ${dualMatch[1]}/${dualMatch[2]}`;
                }

                // Rule 3 Check: R Indicator
                if (/[Rr®]/.test(body)) {
                    const amt = body.replace(/[^0-9]/g, '');
                    return `${prefix} R ${amt}`;
                }

                // Rule 2 Check: Standard
                const cleanAmt = body.replace(/[^0-9]/g, '');
                if (cleanAmt) return `${prefix} = ${cleanAmt}`;

                return line;
            }).filter(x => x !== null);

            outputEl.value = result.join('\n');
            outputEl.classList.add('flash');
            setTimeout(() => outputEl.classList.remove('flash'), 500);
        }

        function copyData() {
            const out = document.getElementById('output');
            if (!out.value) return;
            out.select();
            document.execCommand('copy');
            alert('BUFFER_COPIED_TO_CLIPBOARD');
        }

        function clearData() {
            document.getElementById('input').value = "";
            document.getElementById('output').value = "";
            updateCount();
        }
    </script>
</body>
</html>
